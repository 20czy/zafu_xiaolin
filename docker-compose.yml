services:
  api:
    build:
      context: ./fastapi
    env_file:
      - ./fastapi/.env
    ports:
      - "8001:8001"
    volumes:
      - ./fastapi:/app
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./demo.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/my-app:/my-app
      - /my-app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8001
    depends_on:
      - api
